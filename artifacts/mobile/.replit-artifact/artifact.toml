kind = "mobile"
previewPath = "/"
title = "HistoSpotter"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/"
name = "expo"
paths = [ "/" ]
localPort = 18115

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile", "run", "serve" ]

[services.production.health.startup]
path = "/"

[services.env]
PORT = "18115"
BASE_PATH = "/"
